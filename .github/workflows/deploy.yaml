name: Terraform Deploy

on:
  push:
    branches:
      - main   # Trigger workflow when code is pushed to main branch
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repository code
      - name: Checkout
        uses: actions/checkout@v3

      # Step 2: Set up Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7   # Match your required version (~> 1.0)

      # Step 3: Authenticate with Google Cloud
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          # GCP_SA_KEY must be added in GitHub Secrets (JSON key of service account)

      # Step 4: Configure gcloud CLI (optional but useful for debugging)
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: my-ever-first-project
          export_default_credentials: true

      # Step 5: Initialize Terraform (downloads providers, sets up backend)
      - name: Terraform Init
        run: terraform init

      # Step 6: Validate Terraform syntax
      - name: Terraform Validate
        run: terraform validate

      # Step 7: Run Terraform Plan (shows what will change)
      - name: Terraform Plan
        run: terraform plan -input=false

      # Step 8: Apply Terraform changes automatically
      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false