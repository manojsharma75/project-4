name: Terraform Destroy

on:
    workflow_dispatch:
        inputs:
            confirm_destroy:
                description: "Type DESTROY to confirm"
                required: true

permissions:
    contents: read

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest

    env:
      GOOGLE_CLOUD_PROJECT: my-ever-first-project
      GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      TF_VAR_project: my-ever-first-project
      TF_VAR_region: us-central1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6   # Matches your "~> 1.0" constraint

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Terraform Init
        run: terraform init -backend-config="bucket=manojsharma-terraform-state" -backend-config="prefix=project-4/state"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -refresh=true -parallelism=1