

name: Terraform Destroy

on:
    workflow_dispatch:
        inputs:
            confirm_destroy:
                description: "Type DESTROY to confirm"
                required: true

permissions:
    contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository code
      - name: Checkout
        uses: actions/checkout@v3

      # Step 2: Setup Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7   # Match your required version (~> 1.0)

      # Step 3: Authenticate with Google Cloud
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          # GCP_SA_KEY must be added in GitHub Secrets (JSON key of service account)

      # Step 4: Setup gcloud CLI (optional, useful for debugging)
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: my-ever-first-project
          export_default_credentials: true

      # Step 5: Initialize Terraform (downloads providers, sets up backend)
      - name: Terraform Init
        run: terraform init

      # Step 6: Validate Terraform syntax
      - name: Terraform Validate
        run: terraform validate

      # Step 7: Run Terraform Destroy (tears down all resources)
      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false